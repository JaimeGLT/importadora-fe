<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<title>USA Autopartes — Inventario</title>
<meta name="viewport" content="width=1440" />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

<style>
  :root {
    --cream: #FAF8F5;
    --cream-2: #F0EDE8;
    --paper: #FFFFFF;
    --row-alt: #FAFAF8;
    --ink: #241E18;
    --ink-2: #3A312A;
    --muted: #7A6E62;
    --muted-2: #A89B8C;
    --hair: #E8E1D6;
    --hair-2: #DCD2C2;
    --terra: #B22234;
    --terra-deep: #8C1A28;
    --terra-soft: #F5DCDF;
    --navy: #002868;
    --navy-deep: #001A47;
    --navy-soft: #DDE4EF;
    --ok: #047857;
    --ok-bg: #D1FAE5;
    --warn: #B45309;
    --warn-bg: #FEF3C7;
    --crit: #B22234;
    --crit-bg: #FEE2E2;
    --shadow-sm: 0 1px 2px rgba(36,30,24,0.04);
    --shadow-md: 0 8px 24px -12px rgba(36,30,24,0.10), 0 2px 6px -3px rgba(36,30,24,0.06);
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: "DM Sans", system-ui, sans-serif;
    background: var(--cream);
    color: var(--ink);
    font-size: 14px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    min-width: 1280px;
  }
  /* Brand strip across the top of the page */
  body::before {
    content: "";
    position: fixed; top: 0; left: 0; right: 0;
    height: 4px;
    background: linear-gradient(90deg,
      var(--terra) 0%,
      var(--terra) 33%,
      var(--cream) 33%,
      var(--cream) 38%,
      var(--navy) 38%,
      var(--navy) 100%);
    z-index: 100;
  }
  .serif { font-family: "Instrument Serif", "Iowan Old Style", Georgia, serif; font-weight: 400; letter-spacing: -0.01em; }
  .mono { font-family: "JetBrains Mono", ui-monospace, monospace; }

  button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
  input { font-family: inherit; color: inherit; }

  /* ───────────── App shell ───────────── */
  .app { display: grid; grid-template-columns: 248px 1fr; min-height: 100vh; }

  /* ───────────── Sidebar ───────────── */
  .sidebar {
    background: #F0EDE8;
    border-right: 1px solid #E1DBCF;
    padding: 32px 18px 24px 18px;
    display: flex; flex-direction: column;
    position: sticky; top: 0; height: 100vh;
  }
  .brand {
    padding: 4px 8px 20px 8px;
    border-bottom: 1px solid var(--hair);
    margin-bottom: 18px;
  }
  .brand-row { display: flex; align-items: center; gap: 12px; }
  .brand-mark {
    width: 46px; height: 46px; border-radius: 10px;
    background: var(--navy); color: #FFFFFF;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    font-family: "DM Sans", sans-serif;
    font-size: 14px; font-weight: 800; letter-spacing: 0.08em;
    position: relative; overflow: hidden;
    flex-shrink: 0;
    box-shadow: inset 0 0 0 1px rgba(255,255,255,0.08), 0 1px 2px rgba(0,40,104,0.25);
  }
  .brand-mark .flag-canton {
    position: absolute; top: 4px; left: 4px;
    width: 14px; height: 9px;
    background: transparent;
    background-image:
      radial-gradient(circle at 3px 2.5px, rgba(255,255,255,0.85) 0.5px, transparent 0.7px),
      radial-gradient(circle at 7.5px 2.5px, rgba(255,255,255,0.85) 0.5px, transparent 0.7px),
      radial-gradient(circle at 12px 2.5px, rgba(255,255,255,0.85) 0.5px, transparent 0.7px),
      radial-gradient(circle at 5px 6px, rgba(255,255,255,0.85) 0.5px, transparent 0.7px),
      radial-gradient(circle at 9.5px 6px, rgba(255,255,255,0.85) 0.5px, transparent 0.7px);
  }
  .brand-mark .flag-stripes {
    position: absolute; bottom: 0; left: 0; right: 0;
    height: 8px;
    background: repeating-linear-gradient(
      to bottom,
      var(--terra) 0px, var(--terra) 1.4px,
      #FFFFFF 1.4px, #FFFFFF 2.8px
    );
    opacity: 0.92;
  }
  .brand-mark .usa-text {
    position: relative; z-index: 1;
    margin-top: 2px;
    color: #FFFFFF;
    text-shadow: 0 1px 0 rgba(0,0,0,0.15);
  }
  .brand-name { font-family: "Instrument Serif", serif; font-size: 24px; line-height: 1; letter-spacing: -0.015em; }
  .brand-name em { font-style: italic; color: var(--terra); }
  .brand-tag {
    margin-top: 12px;
    font-family: "Instrument Serif", serif;
    font-style: italic;
    font-size: 12.5px;
    color: var(--muted);
    line-height: 1.35;
  }
  .brand-loc {
    margin-top: 8px;
    display: flex; align-items: center; gap: 6px;
    font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase;
    color: var(--muted-2); font-weight: 600;
  }
  .brand-loc::before {
    content: ""; width: 5px; height: 5px; border-radius: 999px;
    background: var(--terra);
    box-shadow: 0 0 0 3px var(--terra-soft);
  }

  .nav-section-label {
    font-size: 10.5px; letter-spacing: 0.14em; text-transform: uppercase;
    color: var(--muted-2); padding: 14px 12px 8px 12px;
  }
  .nav-item {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 12px; border-radius: 10px;
    color: var(--ink-2); font-size: 14px; font-weight: 500;
    width: 100%; text-align: left;
    transition: background 120ms ease, color 120ms ease;
  }
  .nav-item:hover { background: rgba(36,30,24,0.04); }
  .nav-item.active { background: var(--ink); color: var(--cream); }
  .nav-item.active .badge-count { background: var(--terra); color: white; }
  .nav-item svg { width: 18px; height: 18px; flex: 0 0 18px; }
  .badge-count {
    margin-left: auto; font-size: 11px; font-weight: 600;
    background: var(--hair-2); color: var(--ink-2);
    padding: 2px 7px; border-radius: 999px;
    font-variant-numeric: tabular-nums;
  }

  .sidebar-footer { margin-top: auto; padding-top: 16px; border-top: 1px solid var(--hair); }
  .user-card { display: flex; align-items: center; gap: 12px; padding: 8px 6px; }
  .avatar {
    width: 36px; height: 36px; border-radius: 999px;
    background: linear-gradient(135deg, #B22234 0%, #8C1A28 100%);
    color: white; display: grid; place-items: center;
    font-weight: 600; font-size: 13px;
    border: 2px solid var(--cream-2);
    box-shadow: 0 0 0 1px var(--hair);
  }
  .user-name { font-size: 13.5px; font-weight: 600; line-height: 1.2; }
  .user-role { font-size: 11.5px; color: var(--muted); }

  /* ───────────── Main ───────────── */
  .main {
    padding: 36px 56px 80px 56px;
    max-width: 1600px;
    position: relative;
    background: linear-gradient(180deg, #F4EFE6 0%, var(--cream) 180px, var(--cream) 100%);
    min-height: 100vh;
  }
  .main::after {
    content: "";
    position: absolute;
    inset: 0;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 1600 2400' preserveAspectRatio='xMidYMid meet'><g fill='%23241E18'><g transform='translate(60,240)'><path d='M0 90 L0 60 Q0 50 10 50 L120 50 L142 18 Q148 8 160 8 L260 8 Q272 8 280 16 L322 50 L390 50 Q408 50 414 64 L420 90 Z'/><path d='M168 22 L172 46 L218 46 L218 22 Z M226 22 L226 46 L278 46 L266 26 Q262 22 256 22 Z' fill='%23FAF8F5'/><circle cx='90' cy='94' r='24'/><circle cx='340' cy='94' r='24'/><circle cx='90' cy='94' r='12' fill='%23FAF8F5'/><circle cx='340' cy='94' r='12' fill='%23FAF8F5'/></g><g transform='translate(1380,80)'><path d='M40 2 L74 22 L74 60 L40 80 L6 60 L6 22 Z'/><circle cx='40' cy='41' r='12' fill='%23FAF8F5'/></g><g transform='translate(820,80) rotate(-8)'><rect x='8' y='0' width='12' height='10'/><rect x='2' y='10' width='24' height='8'/><rect x='4' y='18' width='20' height='32'/><path d='M4 50 L24 50 L21 88 L7 88 Z'/><rect x='10' y='88' width='8' height='22'/></g><g transform='translate(1180,220) rotate(28)'><rect x='0' y='0' width='14' height='10'/><path d='M2 10 L12 10 L7 70 Z'/></g><g transform='translate(540,480) rotate(12)'><path d='M40 2 L74 22 L74 60 L40 80 L6 60 L6 22 Z'/><circle cx='40' cy='41' r='12' fill='%23FAF8F5'/></g><g transform='translate(1280,460) rotate(-10)'><circle cx='70' cy='70' r='52'/><rect x='66' y='0' width='8' height='18'/><rect x='66' y='122' width='8' height='18'/><rect x='0' y='66' width='18' height='8'/><rect x='122' y='66' width='18' height='8'/><rect x='28' y='12' width='8' height='18' transform='rotate(-45 32 21)'/><rect x='104' y='12' width='8' height='18' transform='rotate(45 108 21)'/><rect x='28' y='110' width='8' height='18' transform='rotate(45 32 119)'/><rect x='104' y='110' width='8' height='18' transform='rotate(-45 108 119)'/><circle cx='70' cy='70' r='28' fill='%23FAF8F5'/><circle cx='70' cy='70' r='8'/></g><g transform='translate(220,660)'><circle cx='70' cy='70' r='66'/><circle cx='70' cy='70 5' fill='%23FAF8F5'/><circle cx='40' cy='40' r='5' fill='%23FAF8F5'/><circle cx='100' cy='100' r='5' fill='%23FAF8F5'/></g><g transform='translate(520,1340)'><path d='M0 70 L0 52 Q0 44 8 42 L60 32 Q92 8 140 4 L240 4 Q280 10 310 34 L360 42 Q372 44 372 52 L372 70 Z'/><path d='M70 28 Q92 12 130 10 L180 10 L180 34 L66 34 Z M192 10 L240 10 Q280 16 310 34 L192 34 Z' fill='%23FAF8F5'/><circle cx='80' cy='74' r='24'/><circle cx='292' cy='74' r='24'/><circle cx='80' cy='74' r='12' fill='%23FAF8F5'/><circle cx='292' cy='74' r='12' fill='%23FAF8F5'/></g><g transform='translate(180,1500) rotate(-8)'><circle cx='80' cy='80' r='80'/><circle cx='80' cy='80' r='44' fill='%23FAF8F5'/><circle cx='80' cy='80' r='14'/><rect x='76' y='4' width='8' height='32' rx='2' fill='%23FAF8F5'/><rect x='76' y='124' width='8' height='32' rx='2' fill='%23FAF8F5'/><rect x='4' y='76' width='32' height='8' rx='2' fill='%23FAF8F5'/><rect x='124' y='76' width='32' height='8' rx='2' fill='%23FAF8F5'/></g><g transform='translate(1040,1480) rotate(-20)'><path d='M40 2 L74 22 L74 60 L40 80 L6 60 L6 22 Z'/><circle cx='40' cy='41' r='12' fill='%23FAF8F5'/></g><g transform='translate(420,1700) rotate(30)'><rect x='0' y='0' width='14' height='10'/><path d='M2 10 L12 10 L7 70 Z'/></g><g transform='translate(940,1700)'><circle cx='70' cy='70' r='52'/><rect x='66' y='0' width='8' height='18'/><rect x='66' y='122' width='8' height='18'/><rect x='0' y='66' width='18' height='8'/><rect x='122' y='66' width='18' height='8'/><rect x='28' y='12' width='8' height='18' transform='rotate(-45 32 21)'/><rect x='104' y='12' width='8' height='18' transform='rotate(45 108 21)'/><rect x='28' y='110' width='8' height='18' transform='rotate(45 32 119)'/><rect x='104' y='110' width='8' height='18' transform='rotate(-45 108 119)'/><circle cx='70' cy='70' r='28' fill='%23FAF8F5'/><circle cx='70' cy='70' r='8'/></g><g transform='translate(540,1820) rotate(15)'><path d='M0 18 Q0 0 18 0 L40 0 Q58 0 58 18 L58 28 L120 28 L120 8 L160 8 L160 48 L120 48 L120 28 L58 28 L58 38 Q58 56 40 56 L18 56 Q0 56 0 38 Z'/></g><g transform='translate(1080,1980)'><path d='M0 80 L0 50 Q0 40 12 40 L150 40 L180 -10 Q188 -28 210 -28 L380 -28 Q398 -28 410 -16 L470 40 L590 40 Q620 40 630 60 L640 80 Z'/><path d='M220 -8 L230 36 L308 36 L308 -8 Z M318 -8 L318 36 L398 36 L380 -2 Q375 -8 365 -8 Z' fill='%23FAF8F5'/><circle cx='110' cy='88' r='38'/><circle cx='510' cy='88' r='38'/><circle cx='110' cy='88' r='18' fill='%23FAF8F5'/><circle cx='510' cy='88' r='18' fill='%23FAF8F5'/><rect x='438' y='52' width='26' height='8' rx='2'/></g><g transform='translate(60,2080) rotate(90)'><rect x='8' y='0' width='12' height='10'/><rect x='2' y='10' width='24' height='8'/><rect x='4' y='18' width='20' height='32'/><path d='M4 50 L24 50 L21 88 L7 88 Z'/><rect x='10' y='88' width='8' height='22'/></g><g transform='translate(800,2200) rotate(-12)'><path d='M40 2 L74 22 L74 60 L40 80 L6 60 L6 22 Z'/><circle cx='40' cy='41' r='12' fill='%23FAF8F5'/></g><g transform='translate(280,2240) rotate(45)'><rect x='0' y='0' width='14' height='10'/><path d='M2 10 L12 10 L7 70 Z'/></g></g></svg>");
    background-repeat: no-repeat;
    background-size: 100% auto;
    background-position: top center;
    opacity: 0.05;
    pointer-events: none;
    z-index: 0;
    mix-blend-mode: multiply;
  }
  .main > * { position: relative; z-index: 1; }

  .topbar {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 36px;
  }
  .crumbs { font-size: 12.5px; color: var(--muted); display: flex; gap: 6px; align-items: center; letter-spacing: 0.02em; }
  .crumbs .sep { opacity: 0.5; }
  .topbar-right { display: flex; align-items: center; gap: 12px; }
  .icon-btn {
    width: 38px; height: 38px; border-radius: 10px;
    display: grid; place-items: center;
    border: 1px solid var(--hair); background: var(--paper);
    color: var(--ink-2);
    transition: border-color 120ms ease;
    position: relative;
  }
  .icon-btn:hover { border-color: var(--hair-2); }
  .icon-btn .dot {
    position: absolute; top: 9px; right: 10px;
    width: 7px; height: 7px; border-radius: 999px; background: var(--terra);
    box-shadow: 0 0 0 2px var(--paper);
  }
  .pill-date {
    height: 38px; padding: 0 14px;
    border: 1px solid var(--hair); background: var(--paper);
    border-radius: 10px;
    display: flex; align-items: center; gap: 8px;
    font-size: 13px; color: var(--ink-2);
  }
  .pill-date svg { width: 15px; height: 15px; color: var(--muted); }

  /* Header */
  .header {
    display: flex; align-items: flex-end; justify-content: space-between;
    gap: 32px; margin-bottom: 40px;
  }
  .header h1 {
    font-family: "Instrument Serif", serif; font-weight: 400;
    font-size: 72px; line-height: 0.95; letter-spacing: -0.025em;
    margin: 0 0 10px 0;
  }
  .header h1 em { font-style: italic; color: var(--terra); }
  .header .sub { font-size: 16px; color: var(--muted); max-width: 520px; }
  .header-actions { display: flex; gap: 10px; align-items: center; }

  .btn {
    height: 46px; padding: 0 22px;
    border-radius: 12px;
    font-size: 14px; font-weight: 600;
    display: inline-flex; align-items: center; gap: 9px;
    transition: transform 120ms ease, box-shadow 120ms ease, background 120ms ease;
  }
  .btn-primary {
    background: var(--terra); color: white;
    box-shadow: 0 1px 2px rgba(200,80,31,0.3), 0 6px 16px -8px rgba(200,80,31,0.5);
  }
  .btn-primary:hover { background: var(--terra-deep); transform: translateY(-1px); }
  .btn-primary:active { transform: translateY(0); }
  .btn-secondary {
    background: var(--paper); color: var(--ink); border: 1px solid var(--hair);
  }
  .btn-secondary:hover { border-color: var(--hair-2); }
  .btn svg { width: 16px; height: 16px; }

  /* Metric cards */
  .metrics {
    display: grid; grid-template-columns: repeat(4, 1fr);
    gap: 20px; margin-bottom: 44px;
  }
  .metric {
    background: rgba(255,255,255,0.82);
    backdrop-filter: blur(2px);
    border: 1px solid var(--hair);
    border-radius: 16px;
    padding: 28px 30px 26px 30px;
    position: relative;
    transition: border-color 160ms ease, box-shadow 160ms ease;
  }
  .metric:hover { border-color: var(--hair-2); box-shadow: var(--shadow-sm); }
  .metric.is-warn { background: linear-gradient(180deg, #FFF8EE 0%, #FFFDF9 60%); }
  .metric.is-crit {
    background: linear-gradient(180deg, #FCEEE8 0%, #FFFDF9 60%);
    border-color: rgba(178,34,52,0.2);
  }
  .metric.is-crit .ico {
    background: var(--terra);
    color: white;
    box-shadow: 0 4px 12px -3px rgba(178,34,52,0.45), inset 0 0 0 1px rgba(255,255,255,0.18);
    animation: pulse-crit 2.4s ease-in-out infinite;
  }
  .metric.is-crit .ico svg { width: 19px; height: 19px; stroke-width: 2.2; }
  @keyframes pulse-crit {
    0%, 100% { box-shadow: 0 4px 12px -3px rgba(178,34,52,0.45), 0 0 0 0 rgba(178,34,52,0.4), inset 0 0 0 1px rgba(255,255,255,0.18); }
    50%      { box-shadow: 0 4px 12px -3px rgba(178,34,52,0.45), 0 0 0 8px rgba(178,34,52,0), inset 0 0 0 1px rgba(255,255,255,0.18); }
  }
  .metric .label-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; }
  .metric .label { font-size: 12.5px; color: var(--muted); font-weight: 500; letter-spacing: 0.04em; text-transform: uppercase; }
  .metric .ico {
    width: 34px; height: 34px; border-radius: 10px;
    background: var(--cream-2); color: var(--ink-2);
    display: grid; place-items: center;
  }
  .metric .ico svg { width: 17px; height: 17px; }
  .metric.is-warn .ico { background: var(--warn-bg); color: var(--warn); }
  .metric.is-crit .ico { background: var(--crit-bg); color: var(--crit); }
  .metric .value {
    font-family: "Instrument Serif", serif;
    font-size: 52px; line-height: 1; letter-spacing: -0.02em;
    margin-bottom: 10px;
    display: flex; align-items: baseline; gap: 6px;
  }
  .metric .value .unit { font-family: "DM Sans", sans-serif; font-size: 16px; font-weight: 500; color: var(--muted); letter-spacing: 0; }
  .metric .delta { font-size: 12.5px; color: var(--muted); display: flex; align-items: center; gap: 6px; }
  .metric .delta .up { color: var(--ok); font-weight: 600; }
  .metric .delta .down { color: var(--crit); font-weight: 600; }

  /* Table card */
  .table-card {
    background: rgba(255,255,255,0.86);
    backdrop-filter: blur(2px);
    border: 1px solid var(--hair);
    border-radius: 18px;
    overflow: hidden;
  }
  .table-toolbar {
    display: flex; align-items: center; gap: 14px;
    padding: 22px 28px;
    border-bottom: 1px solid var(--hair);
  }
  .table-title { font-family: "Instrument Serif", serif; font-size: 28px; line-height: 1; letter-spacing: -0.01em; }

      </div>
      <div className="delta">
        {deltaDir === "up" && <span className="up">↑ {delta}</span>}
        {deltaDir === "down" && <span className="down">↓ {delta}</span>}
        {deltaDir === "flat" && <span style={{color:"var(--muted)"}}>{delta}</span>}
        <span>{sublabel}</span>
      </div>
    </div>
  );
}

function StockBadge({ status }) {
  const map = {
    ok:   { cls:"ok",   label:"En stock" },
    warn: { cls:"warn", label:"Stock bajo" },
    crit: { cls:"crit", label:"Crítico" },
  };
  const m = map[status];
  return <span className={"badge " + m.cls}>{m.label}</span>;
}

function ProductRow({ p, onOpen }) {
  const pct = Math.min(100, (p.stock / Math.max(p.min*2, 1)) * 100);
  return (
    <tr>
      <td>
        <div style={{display:"flex", alignItems:"center", gap:14}}>
          <div className="photo">
            <div className="photo-stripes" />
            {I.box}
          </div>
          <div>
            <div className="sku">{p.code}</div>
            <div className="product-name">{p.name}</div>
          </div>
        </div>
      </td>
      <td>
        <div className="product-meta" style={{maxWidth:240}}>{p.meta}</div>
        <div style={{fontSize:11, color:"var(--muted-2)", marginTop:3, letterSpacing:"0.06em", textTransform:"uppercase"}}>{p.cat}</div>
      </td>
      <td>
        <div className="brand-cell">
          <span className="brand-dot" />
          <span className="brand-name-cell">{p.brand}</span>
        </div>
      </td>
      <td className="num">
        <div style={{textAlign:"right"}}>
          <div className="stock-num">{INT(p.stock)}</div>
          <div className="stock-unit">mín. {p.min}</div>
        </div>
      </td>
      <td><StockBadge status={p.status} /></td>
      <td className="num">
        <div className="price-main"><span className="price-bs">Bs.</span> {TWO(p.sale)}</div>
        <div className="price-sub">PVP unitario</div>
      </td>
      <td className="num">
        <div className="price-main" style={{color:"var(--muted)"}}><span className="price-bs">Bs.</span> {TWO(p.cost)}</div>
        <div className="price-sub">margen {Math.round(((p.sale-p.cost)/p.sale)*100)}%</div>
      </td>
      <td>
        <div className="actions-cell">
          <button className="row-action" title="Ver detalle" onClick={() => onOpen(p)}>{I.eye}</button>
          <button className="row-action" title="Editar">{I.edit}</button>
          <button className="row-action danger" title="Eliminar">{I.trash}</button>
        </div>
      </td>
    </tr>
  );
}

function App() {
  const [query, setQuery] = useState("");
  const [stockFilter, setStockFilter] = useState("all");  // all | ok | warn | crit
  const [catFilter, setCatFilter] = useState("Todas");
  const [sortBy, setSortBy] = useState({ key: "name", dir: "asc" });
  const [drawerOpen, setDrawerOpen] = useState(false);
  const [drawerProduct, setDrawerProduct] = useState(null);
  const [toast, setToast] = useState("");

  const cats = useMemo(() => ["Todas", ...Array.from(new Set(PRODUCTS.map(p=>p.cat)))], []);

  const filtered = useMemo(() => {
    let list = PRODUCTS.filter(p => {
      if (stockFilter !== "all" && p.status !== stockFilter) return false;
      if (catFilter !== "Todas" && p.cat !== catFilter) return false;
      if (query) {
        const q = query.toLowerCase();
        return p.name.toLowerCase().includes(q) || p.code.toLowerCase().includes(q) || p.brand.toLowerCase().includes(q) || p.meta.toLowerCase().includes(q);
      }
      return true;
    });
    list.sort((a,b) => {
      const k = sortBy.key, dir = sortBy.dir === "asc" ? 1 : -1;
      if (typeof a[k] === "number") return (a[k]-b[k])*dir;
      return a[k].localeCompare(b[k])*dir;
    });
    return list;
  }, [query, stockFilter, catFilter, sortBy]);

  const openDrawer = (p) => {
    setDrawerProduct(p || null);
    setDrawerOpen(true);
  };
  const closeDrawer = () => setDrawerOpen(false);

  const showToast = (msg) => {
    setToast(msg);
    setTimeout(() => setToast(""), 2400);
  };

  const handleSort = (key) => {
    setSortBy(s => s.key === key ? { key, dir: s.dir === "asc" ? "desc" : "asc" } : { key, dir: "asc" });
  };
  const sortIcon = (key) => sortBy.key !== key ? null : (sortBy.dir === "asc" ? <span className="arrow">↑</span> : <span className="arrow">↓</span>);

  return (
    <div className="app">
      <Sidebar />

      <main className="main">
        {/* Topbar */}
        <div className="topbar">
          <div className="crumbs">
            <span>Operaciones</span>
            <span className="sep">/</span>
            <span style={{color:"var(--ink)"}}>Inventario</span>
          </div>
          <div className="topbar-right">
            <div className="pill-date">{I.cal}<span>Mié, 7 may. 2026</span></div>
            <button className="icon-btn" title="Notificaciones">{I.bell}<span className="dot" /></button>
            <button className="icon-btn" title="Configuración">{I.sys}</button>
          </div>
        </div>

        {/* Header */}
        <div className="header">
          <div>
            <h1 className="serif">Inventario<em>.</em></h1>
            <div className="sub">Gestión de repuestos y autopartes — control en tiempo real de existencias, costos en bolivianos y movimientos de almacén.</div>
          </div>
          <div className="header-actions">
            <button className="btn btn-secondary">{I.download}<span>Exportar</span></button>
            <button className="btn btn-primary" onClick={() => openDrawer(null)}>{I.plus}<span>Nuevo producto</span></button>
          </div>
        </div>

        {/* Metrics */}
        <div className="metrics">
          <Metric
            label="Total productos"
            value="412"
            icon={I.box}
            delta="+18"
            deltaDir="up"
            sublabel="vs. mes anterior"
          />
          <Metric
            label="Stock crítico"
            value="9"
            icon={I.alert}
            tone="crit"
            delta="3 nuevos"
            deltaDir="down"
            sublabel="requieren reposición"
          />
          <Metric
            label="Valor de almacén"
            value="248,612"
            unit="Bs."
            icon={I.vault}
            delta="+4.2%"
            deltaDir="up"
            sublabel="al precio de costo"
          />
          <Metric
            label="Ventas hoy"
            value="14,820"
            unit="Bs."
            icon={I.cart}
            delta="+12 órdenes"
            deltaDir="up"
            sublabel="hasta las 16:42"
          />
        </div>

        {/* Table */}
        <div className="table-card">
          <div className="table-toolbar">
            <div>
              <div className="table-title serif">
                Productos
                <span className="count">{filtered.length} de {PRODUCTS.length}</span>
              </div>
            </div>
            <div className="search">
              {I.search}
              <input
                placeholder="Buscar por nombre, código o marca…"
                value={query}
                onChange={e => setQuery(e.target.value)}
              />
            </div>
            <button className="filter-chip">{I.filter}<span>Filtros</span></button>
          </div>

          <div className="filter-row">
            <span className="label-tiny">Stock</span>
            {[
              {k:"all",  l:"Todos"},
              {k:"ok",   l:"En stock"},
              {k:"warn", l:"Bajo"},
              {k:"crit", l:"Crítico"},
            ].map(f => (
              <button key={f.k}
                className={"filter-chip" + (stockFilter === f.k ? " active" : "")}
                onClick={() => setStockFilter(f.k)}>
                {f.l}
              </button>
            ))}
          </div>

          <table>
            <thead>
              <tr>
                <th className="th-sortable" onClick={() => handleSort("name")}>
                  Código / Producto {sortIcon("name")}
                </th>
                <th>Detalle</th>
                <th className="th-sortable" onClick={() => handleSort("brand")}>
                  Marca {sortIcon("brand")}
                </th>
                <th className="num th-sortable" onClick={() => handleSort("stock")}>
                  Stock {sortIcon("stock")}
                </th>
                <th>Estado</th>
                <th className="num th-sortable" onClick={() => handleSort("sale")}>
                  Precio venta {sortIcon("sale")}
                </th>
                <th className="num th-sortable" onClick={() => handleSort("cost")}>
                  Precio costo {sortIcon("cost")}
                </th>
                <th className="num">Acciones</th>
              </tr>
            </thead>
            <tbody>
              {filtered.map(p => <ProductRow key={p.code} p={p} onOpen={openDrawer} />)}
              {filtered.length === 0 && (
                <tr><td colSpan="8" style={{textAlign:"center", padding:"60px 20px", color:"var(--muted)"}}>
                  Sin resultados para esta combinación de filtros.
                </td></tr>
              )}
            </tbody>
          </table>

          <div className="table-footer">
            <div className="footer-meta">Mostrando {filtered.length} de {PRODUCTS.length} productos · ordenados por {sortBy.key}</div>
            <div className="pagi">
              <button className="pg disabled">‹</button>
              <button className="pg active">1</button>
              <button className="pg">2</button>
              <button className="pg">3</button>
              <span style={{padding:"0 6px", color:"var(--muted)"}}>…</span>
              <button className="pg">42</button>
              <button className="pg">›</button>
            </div>
          </div>
        </div>
      </main>

      {/* Drawer */}
      <div className={"drawer-bg" + (drawerOpen ? " open" : "")} onClick={closeDrawer} />
      <aside className={"drawer" + (drawerOpen ? " open" : "")}>
        <div className="drawer-head">
          <div>
            <div style={{fontSize:11, letterSpacing:"0.1em", textTransform:"uppercase", color:"var(--muted)", marginBottom:6}}>
              {drawerProduct ? "Detalle del producto" : "Nuevo producto"}
            </div>
            <h2>{drawerProduct ? drawerProduct.name : "Registrar autoparte"}</h2>
            {drawerProduct && <div className="sku" style={{marginTop:4}}>{drawerProduct.code}</div>}
          </div>
          <button className="row-action" onClick={closeDrawer}>{I.close}</button>
        </div>

        <div className="drawer-body">
          <div className="field">
            <label>Nombre del producto</label>
            <input defaultValue={drawerProduct?.name || ""} placeholder="Ej. Pastillas freno delanteras" />
          </div>
          <div className="field-row">
            <div className="field">
              <label>Código / SKU</label>
              <input defaultValue={drawerProduct?.code || ""} placeholder="BR-PF-0000" />
            </div>
            <div className="field">
              <label>Marca</label>
              <input defaultValue={drawerProduct?.brand || ""} placeholder="Brembo, NGK, Bosch…" />
            </div>
          </div>
          <div className="field">
            <label>Descripción / Aplicación</label>
            <input defaultValue={drawerProduct?.meta || ""} placeholder="Compatibilidad y especificaciones" />
          </div>
          <div className="field-row">
            <div className="field">
              <label>Stock actual</label>
              <input type="number" defaultValue={drawerProduct?.stock || 0} />
            </div>
            <div className="field">
              <label>Stock mínimo</label>
              <input type="number" defaultValue={drawerProduct?.min || 0} />
            </div>
          </div>
          <div className="field-row">
            <div className="field">
              <label>Precio costo (Bs.)</label>
              <input type="number" defaultValue={drawerProduct?.cost || ""} placeholder="0.00" />
            </div>
            <div className="field">
              <label>Precio venta (Bs.)</label>
              <input type="number" defaultValue={drawerProduct?.sale || ""} placeholder="0.00" />
            </div>
          </div>
          <div className="field">
            <label>Categoría</label>
            <select defaultValue={drawerProduct?.cat || ""}>
              <option value="" disabled>Selecciona una categoría</option>
              {cats.filter(c=>c!=="Todas").map(c=><option key={c}>{c}</option>)}
            </select>
          </div>
        </div>

        <div className="drawer-foot">
          <button className="btn btn-secondary" onClick={closeDrawer}>Cancelar</button>
          <button className="btn btn-primary" onClick={() => { closeDrawer(); showToast(drawerProduct ? "Producto actualizado" : "Producto registrado"); }}>
            {drawerProduct ? "Guardar cambios" : "Registrar producto"}
          </button>
        </div>
      </aside>

      {/* Toast */}
      <div className={"toast" + (toast ? " show" : "")}>
        <span className="check"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><path d="M5 12l5 5L20 7"/></svg></span>
        <span>{toast}</span>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
